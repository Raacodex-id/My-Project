  let toggle = document.querySelector(".menu-toggle");

  <script>
const aboutSection = document.querySelector('#about');
const skills = document.querySelectorAll('.skills li');
const profilePic = document.querySelector('.about-image img');

function showAbout() {
  const triggerBottom = window.innerHeight * 0.85;
  const aboutTop = aboutSection.getBoundingClientRect().top;

  if(aboutTop < triggerBottom){
    aboutSection.classList.add('scroll-show');
    skills.forEach(skill => skill.style.opacity = '1');
    profilePic.style.opacity = '1';
  }
}

window.addEventListener('scroll', showAbout);
window.addEventListener('load', showAbout);
</script>
